<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ invitacion.titulo_landing }}</title>
    
    <!-- Fuentes dinámicas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600;700&family=Nunito:wght@400;600;700&family=Pacifico&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --inv-primary: {{ invitacion.color_primario|default:"#ffffff" }};
            --inv-text: {{ invitacion.color_texto|default:"#ffffff" }};
            --inv-font: '{{ invitacion.fuente_texto }}', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: var(--inv-font);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            color: var(--inv-text);
            text-align: center;
            padding: 2rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        /* Estilos dinámicos para los botones */
        .btn-custom-primary {
            background-color: var(--inv-primary);
            color: #ffffff; /* Texto blanco sobre el color primario */
            text-shadow: none; /* Quitamos la sombra del texto principal para los botones */
        }
        .btn-custom-secondary {
            background-color: #ffffff;
            color: var(--inv-primary);
            text-shadow: none;
        }

        .interactive {
            pointer-events: auto;
        }

        .gsap-element {
            opacity: 0;
            transform: translateY(30px);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer" class="w-full h-full flex flex-col justify-between py-10 px-4 md:px-8">
        <!-- Título Arriba -->
        <div class="w-full text-center mt-2 md:mt-8 shrink-0">
            <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold drop-shadow-md parallax-title mb-2" id="titulo" style="font-family: '{{ invitacion.fuente_texto }}', sans-serif;">{{ invitacion.titulo_landing }}</h1>
            
            <!-- Fecha -->
            <div class="text-center parallax-info" id="fecha">
                <p class="text-lg md:text-2xl font-bold drop-shadow-md">{{ invitacion.fecha_evento|date:"l j \d\e F \d\e Y, H:i" }}</p>
                <p class="text-sm md:text-base font-medium opacity-90 mt-1 drop-shadow-md">{{ invitacion.direccion_texto }}</p>
            </div>
        </div>

        <!-- Descripción al Medio -->
        <div class="w-full max-w-3xl text-center flex flex-col justify-center items-center flex-grow mx-auto">
            <p class="text-lg md:text-2xl font-medium drop-shadow-md leading-relaxed parallax-desc" id="descripcion">{{ invitacion.descripcion }}</p>
        </div>
        
        <!-- Contenedor Inferior: Botones -->
        <div class="w-full flex flex-col items-center justify-end shrink-0 mb-16 md:mb-24">
            
            <!-- Botones (Iconos flotantes) -->
            <div class="flex gap-6 interactive" id="botones">
                {% if invitacion.direccion_google_maps_link %}
                <a href="{{ invitacion.direccion_google_maps_link }}" target="_blank" rel="noopener noreferrer" class="btn-glass w-14 h-14 md:w-16 md:h-16 flex items-center justify-center btn-custom-secondary rounded-full shadow-xl transition transform hover:scale-110" title="Ubicación">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-7 h-7 md:w-8 md:h-8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                    </svg>
                </a>
                {% endif %}
                {% if invitacion.link_lista_deseos %}
                <a href="{{ invitacion.link_lista_deseos }}" target="_blank" rel="noopener noreferrer" class="btn-glass w-14 h-14 md:w-16 md:h-16 flex items-center justify-center btn-custom-primary rounded-full shadow-xl transition transform hover:scale-110" title="Lista de Regalos">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-7 h-7 md:w-8 md:h-8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M21 11.25v8.25a1.5 1.5 0 01-1.5 1.5H5.25a1.5 1.5 0 01-1.5-1.5v-8.25M12 4.875A2.625 2.625 0 109.375 7.5H12m0-2.625V7.5m0-2.625A2.625 2.625 0 1114.625 7.5H12m0 0V21m-8.625-9.75h18c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125h-18c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" />
                    </svg>
                </a>
                {% endif %}
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/BokehShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/BokehPass.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader();
        
        const layersDataUnfiltered = [
            {% for capa in invitacion.capas.all %}
            { url: "{{ capa.imagen.url }}", z: {{ capa.z_index }}, dispositivo: "{{ capa.dispositivo }}", pegarAbajo: {{ capa.pegar_abajo|yesno:"true,false" }} },
            {% endfor %}
        ];
        
        // Filtrar capas por dispositivo
        const isMobile = window.innerWidth < 768;
        const layersData = layersDataUnfiltered.filter(layer => 
            layer.dispositivo === 'todos' || 
            (layer.dispositivo === 'movil' && isMobile) || 
            (layer.dispositivo === 'escritorio' && !isMobile)
        );

        // Manejo seguro de floats previniendo errores de sintaxis por comas (ej. 1,5 vs 1.5) dependiendo del idioma
        const fuerzaGiro = parseFloat("{{ invitacion.fuerza_giro|default:'1.0' }}".replace(',', '.'));
        const fuerzaDesplazamiento = parseFloat("{{ invitacion.fuerza_desplazamiento|default:'1.0' }}".replace(',', '.'));
        const activarBokeh = {{ invitacion.activar_bokeh|yesno:"true,false" }};

        const planes = [];
        let isDynamic = false;

        const minZ = layersData.length > 0 ? Math.min(...layersData.map(l => l.z)) : 0;

        function createPlane(layerData) {
            return new Promise((resolve) => {
                textureLoader.load(layerData.url, (texture) => {
                    const geometry = new THREE.PlaneGeometry(1, 1);
                    const material = new THREE.MeshBasicMaterial({ 
                        map: texture, 
                        transparent: true,
                        alphaTest: 0.05,
                        opacity: 0
                    });
                    const plane = new THREE.Mesh(geometry, material);
                    
                    const zPosition = layerData.z;
                    const modoEscala = layerData.escala;
                    const anclaje = layerData.anclaje;

                    const distance = camera.position.z - zPosition;
                    const vFov = THREE.MathUtils.degToRad(camera.fov);
                    const planeHeightAtDistance = 2 * Math.tan(vFov / 2) * distance;
                    const planeWidthAtDistance = planeHeightAtDistance * camera.aspect;

                    const screenRatio = planeWidthAtDistance / planeHeightAtDistance;
                    const imageRatio = texture.image.width / texture.image.height;

                    // Forzar siempre Cover y reducir buffer a 1.05 para evitar zoom excesivo
                    const parallaxBuffer = 1.05; 
                    let finalWidth, finalHeight;

                    if (screenRatio > imageRatio) {
                        finalWidth = planeWidthAtDistance * parallaxBuffer;
                        finalHeight = (planeWidthAtDistance / imageRatio) * parallaxBuffer;
                    } else {
                        finalWidth = (planeHeightAtDistance * imageRatio) * parallaxBuffer;
                        finalHeight = planeHeightAtDistance * parallaxBuffer;
                    }
                    
                    plane.scale.set(finalWidth, finalHeight, 1);
                    
                    // Centrar perfectamente o Pegar Abajo según el CMS
                    let base_x = 0;
                    let base_y = 0;
                    if (layerData.pegarAbajo) {
                        base_y = -(planeHeightAtDistance / 2) + (finalHeight / 2);
                    }

                    plane.position.x = base_x;
                    plane.position.y = base_y;
                    
                    plane.userData.finalZ = zPosition;
                    plane.position.z = zPosition - 15;
                    plane.userData.base_x = base_x;
                    plane.userData.base_y = base_y;
                    plane.userData.pegarAbajo = layerData.pegarAbajo;
                    
                    // Multiplicador más pequeño (0.05 en lugar de 0.15) para que el frente no se separe demasiado del fondo
                    plane.userData.zMultiplier = (zPosition === minZ) ? 0 : (zPosition - minZ) * 0.05;
                    
                    scene.add(plane);
                    resolve(plane);
                });
            });
        }

        let composer, renderPass, bokehPass;
        if (activarBokeh) {
            composer = new THREE.EffectComposer(renderer);
            renderPass = new THREE.RenderPass(scene, camera);
            composer.addPass(renderPass);
            bokehPass = new THREE.BokehPass(scene, camera, {
                focus: 10, aperture: 0.005, maxblur: 0.05, // Apertura equilibrada para que Z=0 (sujeto) se vea nítido
                width: window.innerWidth, height: window.innerHeight
            });
            composer.addPass(bokehPass);
        }

        if (layersData.length > 0) {
            const promises = layersData.map(layer => createPlane(layer));
            Promise.all(promises).then((loadedPlanes) => {
                loadedPlanes.sort((a, b) => a.userData.finalZ - b.userData.finalZ);
                planes.push(...loadedPlanes);
                
                isDynamic = true;
                loadedPlanes.forEach((p, index) => {
                    gsap.to(p.material, { opacity: 1, duration: 2, ease: "power2.out", delay: index * 0.2 });
                    gsap.to(p.position, { z: p.userData.finalZ, duration: 2.5, ease: "expo.out", delay: index * 0.2 });
                });
                
                
                // Diseño Premium de Textos (3D Rotate + Blur + Stagger)
                const tl = gsap.timeline({ delay: 0.5 });
                tl.from('.parallax-title', { 
                    y: 80, rotationX: 45, opacity: 0, filter: "blur(15px)", duration: 1.8, 
                    ease: "expo.out", transformOrigin: "50% 100%" 
                })
                .from('.parallax-info p', { 
                    y: 30, opacity: 0, duration: 1.2, 
                    stagger: 0.2, ease: "back.out(2)" 
                }, "-=1.4")
                .from('.parallax-desc', { 
                    y: 40, opacity: 0, duration: 1.5, filter: "blur(5px)",
                    ease: "power4.out" 
                }, "-=1.0")
                // fromTo en los botones con clearProps evita el bug de que desaparezcan al terminar
                .fromTo('.btn-glass', 
                    { y: 30, opacity: 0, scale: 0.8 }, 
                    { y: 0, opacity: 1, scale: 1, duration: 1, stagger: 0.15, ease: "back.out(1.5)", clearProps: "all" }, 
                "-=0.8");
            });
        }

        let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX) * 0.001;
            mouseY = (event.clientY - windowHalfY) * 0.001;
        });

            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (event) => {
                    const gamma = Math.max(-45, Math.min(45, event.gamma || 0));
                    const beta = Math.max(-45, Math.min(45, (event.beta || 0) - 45));
                    mouseX = gamma * 0.025;
                    mouseY = beta * 0.025;
                });
            }

        function animate() {
            requestAnimationFrame(animate);

            if (isDynamic) {
                targetX += (mouseX - targetX) * 0.05;
                targetY += (mouseY - targetY) * 0.05;

                // Anclamos la cámara rígidamente para que el fondo negro NUNCA se asome
                camera.position.x = 0;
                camera.position.y = 0;
                camera.lookAt(scene.position);

                // Rotamos y trasladamos las capas individualmente
                planes.forEach(plane => {
                    // Posición X
                    plane.position.x = plane.userData.base_x + (-targetX * plane.userData.zMultiplier * fuerzaDesplazamiento);
                    
                    // Posición Y con Lógica Anti-Cortes (Pegar Abajo)
                    let displacementY = targetY * plane.userData.zMultiplier * fuerzaDesplazamiento;
                    if (plane.userData.pegarAbajo && displacementY > 0) {
                        displacementY = 0; // Clampeamos hacia arriba para que no revele el corte inferior
                    }
                    plane.position.y = plane.userData.base_y + displacementY;
                    
                    // Rotación simulada
                    plane.rotation.y = targetX * plane.userData.zMultiplier * 0.1 * fuerzaGiro;
                    plane.rotation.x = targetY * plane.userData.zMultiplier * 0.1 * fuerzaGiro;
                });
            }

            if (activarBokeh && composer) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (activarBokeh && composer) {
                composer.setSize(window.innerWidth, window.innerHeight);
            }
        });

    </script>
</body>
</html>
