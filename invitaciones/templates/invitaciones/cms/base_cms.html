<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CMS - Invitaciones{% endblock %}</title>
    
    <!-- Google Fonts: Quicksand para un toque suave y moderno -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --cms-bg: #f8fafc;
            --cms-primary: #8b5cf6; /* Lila suave/moderno */
            --cms-primary-hover: #7c3aed;
            --cms-card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            --cms-radius: 1rem;
        }

        body {
            background-color: var(--cms-bg);
            font-family: 'Quicksand', sans-serif;
            color: #334155;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar personalizada */
        .navbar-cms {
            background-color: white;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            padding: 1rem 2rem;
        }
        
        .navbar-cms .navbar-brand {
            font-weight: 700;
            color: var(--cms-primary);
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        /* Tarjetas con estilo "Soft" */
        .card {
            border: none;
            border-radius: var(--cms-radius);
            box-shadow: var(--cms-card-shadow);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        /* Formularios */
        .form-control, .form-select {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--cms-primary);
            box-shadow: 0 0 0 0.25rem rgba(139, 92, 246, 0.25);
        }

        /* Botones personalizados */
        .btn-primary {
            background-color: var(--cms-primary);
            border-color: var(--cms-primary);
            border-radius: 0.75rem;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: var(--cms-primary-hover);
            border-color: var(--cms-primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline-primary {
            color: var(--cms-primary);
            border-color: var(--cms-primary);
            border-radius: 0.75rem;
        }

        .btn-outline-primary:hover {
            background-color: var(--cms-primary);
            color: white;
        }

        .btn-danger {
            border-radius: 0.75rem;
            font-weight: 600;
        }

        /* Main container */
        .cms-container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-weight: 700;
            color: #0f172a;
            margin: 0;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-cms sticky-top">
        <div class="container-fluid max-w-1100 px-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'cms_dashboard' %}">
                <i class="bi bi-balloon-heart-fill"></i>
                Gestor de Invitaciones
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active fw-medium" href="{% url 'cms_dashboard' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'index' %}" target="_blank">Ver Sitio Público <i class="bi bi-box-arrow-up-right ms-1"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="cms-container">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
